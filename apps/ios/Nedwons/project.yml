# XcodeGen spec for the NEDWONS app (a runnable @main iOS target that boots the real product shell).
# Generate the project with `xcodegen generate` (in this directory), then build/run.
# The app links the local SwiftPM packages by relative path, so no versions are pinned here.
# Regenerate whenever this file changes; the generated .xcodeproj is a build artifact (gitignored).
name: Nedwons
options:
  bundleIdPrefix: app.nedwons
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  NedwonsKit:
    path: ../NedwonsKit
  NedwonsMLS:
    path: ../NedwonsMLS
  NedwonsApp:
    path: ../NedwonsApp

targets:
  Nedwons:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: NedwonsKit
        product: NedwonsUI
      - package: NedwonsMLS
        product: MlsFfi
      - package: NedwonsApp
        product: NedwonsAppKit
      # Embed the Notification Service Extension (#4) so a contentless push can decrypt + rewrite.
      - target: NotificationService
        embed: true
    # A real Info.plist (not the auto-generated one) so the app can carry custom build config:
    #   NedwonsServerURL          — backend base URL for this build (https on device; empty ⇒ dev)
    #   NedwonsTransparencyLogKey — the out-of-band-pinned KT log public key (hex; empty ⇒ dev TOFU)
    # Set these per build configuration (or via CI) before a device build; AppConfig reads them.
    info:
      path: Nedwons/Info.plist
      properties:
        CFBundleDisplayName: Nedwons
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Wake the app to fetch its inbox on a contentless push (#4).
        UIBackgroundModes:
          - remote-notification
        # Pairing to link a device scans a QR code (#8 device linking).
        NSCameraUsageDescription: "Scan a pairing code to securely link another of your devices."
        NedwonsServerURL: ""
        NedwonsTransparencyLogKey: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nedwons.demo
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Capabilities are declared in the entitlements file; the App ID + provisioning profile that
        # authorize them are configured in the Apple Developer portal (your side).
        CODE_SIGN_ENTITLEMENTS: Nedwons.entitlements

  # Notification Service Extension (#4): decrypts a contentless wake push on device and rewrites the
  # alert. Links the real MLS core; the decode logic (PushInboxDecoder) is unit-tested in NedwonsApp.
  NotificationService:
    type: app-extension
    platform: iOS
    sources:
      - NotificationService
    # Links only extension-SAFE modules: NedwonsPush (push decode) → NedwonsKit (HTTP) + MlsFfi
    # (MLS core). It must NOT link NedwonsUI (SwiftUI App types are forbidden in app extensions).
    dependencies:
      - package: NedwonsApp
        product: NedwonsPush
      - package: NedwonsKit
        product: NedwonsKit
      - package: NedwonsMLS
        product: MlsFfi
    info:
      path: NotificationService/Info.plist
      properties:
        CFBundleDisplayName: Nedwons Notifications
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nedwons.demo.NotificationService
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
