# CI security gates (SECURITY.md, NIST SSDF). This pipeline is defined but has not been
# executed in the current development environment (RISK_REGISTER R-501): there is no CI
# runner here. It is the intended enforcement and must be wired to the real repository.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: backend (auth-core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --manifest-path auth-core/Cargo.toml -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path auth-core/Cargo.toml --all-targets -- -D warnings
      - name: Test (security invariants)
        run: cargo test --manifest-path auth-core/Cargo.toml
      - name: Dependency advisories (SCA)
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

  ios:
    name: ios (build + test)
    runs-on: macos-15   # must provide Xcode 26 (iOS 26 SDK) per Apple's 2026-04-28 mandate
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode
        run: xcodebuild -version
      # The iOS project is a skeleton in this milestone (RISK_REGISTER R-101). Once the
      # Xcode project is committed, enable a build + unit-test step here, e.g.:
      # - run: xcodebuild -scheme Sentinel -destination 'platform=iOS Simulator,name=iPhone 16' build test
      - name: Placeholder
        run: echo "iOS build/test enabled when the Xcode project lands (Milestone 1)."

  release-gate:
    name: release gate
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      # A release build must additionally fail on: any Critical RISK_REGISTER item still
      # OPEN without a signed, time-boxed acceptance; missing SBOM/provenance; insecure
      # release config. Implemented when release automation lands (Milestone 5).
      - name: Placeholder
        run: echo "Release gates enforced at Milestone 5 (SBOM, provenance, risk-register check)."
